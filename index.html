<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIKUS QUIZ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --gold2: #ffaa00;
    --dark: #0a0a0f;
    --dark2: #111118;
    --dark3: #1a1a2e;
    --panel: #13131f;
    --border: #2a2a44;
    --text: #e8e8ff;
    --muted: #6b6b99;
    --green: #39ff91;
    --red: #ff4466;
    --blue: #4488ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ANIMATED BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(245,200,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(68,136,255,0.07) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.015) 60px, rgba(255,255,255,0.015) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.015) 60px, rgba(255,255,255,0.015) 61px);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle linear infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.7; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* HEADER */
  .logo {
    text-align: center;
    margin-bottom: 10px;
  }
  .logo h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold2), #fff8, var(--gold));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    letter-spacing: 4px;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(245,200,66,0.5));
  }
  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .logo p {
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* PANELS */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 600px;
    position: relative;
    overflow: hidden;
    animation: panelIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
    text-align: center;
  }

  /* INPUTS */
  .input-wrap {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,200,66,0.15);
  }

  /* BUTTONS */
  .btn {
    display: inline-block;
    padding: 14px 32px;
    border: none;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover::after { opacity: 0.08; }
  .btn:active { transform: scale(0.97); }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--dark);
    width: 100%;
    font-size: 1rem;
    padding: 16px;
    box-shadow: 0 4px 24px rgba(245,200,66,0.3);
  }
  .btn-gold:hover { box-shadow: 0 4px 32px rgba(245,200,66,0.5); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 10px 20px;
    margin-top: 12px;
    width: 100%;
  }
  .btn-outline:hover { border-color: var(--muted); color: var(--text); }

  /* QUIZ */
  .progress-bar-wrap {
    background: var(--dark3);
    border-radius: 999px;
    height: 6px;
    margin-bottom: 30px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 999px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(245,200,66,0.6);
  }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .q-num { color: var(--gold); font-family: 'Orbitron', sans-serif; font-weight: 700; }
  .q-pts { color: var(--muted); }

  .question-text {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 28px;
    color: var(--text);
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    text-align: left;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--dark);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(245,200,66,0.05);
    transform: translateX(4px);
  }
  .option-btn:hover:not(:disabled) .option-letter {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(57,255,145,0.08);
    animation: correctPulse 0.4s ease;
  }
  .option-btn.correct .option-letter {
    background: var(--green);
    color: var(--dark);
    border-color: var(--green);
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(255,68,102,0.08);
    animation: wrongShake 0.4s ease;
  }
  .option-btn.wrong .option-letter {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }
  .option-btn:disabled { cursor: default; }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* FEEDBACK TOAST */
  .feedback {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px;
    border-radius: 8px;
    margin-top: 16px;
    animation: fadeIn 0.3s ease;
  }
  .feedback.correct-fb { color: var(--green); background: rgba(57,255,145,0.1); border: 1px solid rgba(57,255,145,0.3); }
  .feedback.wrong-fb { color: var(--red); background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.3); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SCORE DISPLAY */
  .score-big {
    text-align: center;
    padding: 20px 0;
  }
  .score-number {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(3rem, 10vw, 5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(245,200,66,0.4));
    line-height: 1;
  }
  .score-label {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .score-rank {
    margin-top: 20px;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin: 24px 0;
  }
  .stat-box {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-lbl {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* BLOCKED */
  .blocked-icon {
    font-size: 4rem;
    text-align: center;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .warning-box {
    background: rgba(255,68,102,0.08);
    border: 1px solid rgba(255,68,102,0.3);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    color: var(--red);
    font-size: 0.9rem;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  /* HIDDEN */
  .screen { display: none; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .screen.hidden { display: none !important; }

  /* DECORATIVE */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .tag {
    display: inline-block;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.3);
    color: var(--gold);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
  }

  .current-user-bar {
    background: rgba(245,200,66,0.05);
    border: 1px solid rgba(245,200,66,0.15);
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    margin-bottom: 20px;
    width: 100%;
    max-width: 600px;
  }
  .current-user-bar .dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .current-user-bar span { color: var(--muted); letter-spacing: 1px; }
  .current-user-bar strong { color: var(--gold); }

  .next-btn-wrap {
    margin-top: 20px;
    text-align: right;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--dark);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 2px;
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(245,200,66,0.3);
    display: none;
  }
  .btn-next:hover { box-shadow: 0 4px 24px rgba(245,200,66,0.5); transform: translateY(-1px); }

  .timer-bar {
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    margin-top: 8px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    transition: width 1s linear;
  }

  input[type="text"]::placeholder, input[type="password"]::placeholder {
    color: #3a3a5a;
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="container">
  <div class="logo">
    <h1>NIKUS QUIZ</h1>
    <p>Перевір своє знання гри</p>
  </div>

  <!-- REGISTRATION SCREEN -->
  <div class="screen" id="screenRegister">
    <div class="panel">
      <div style="text-align:center;margin-bottom:8px;"><span class="tag">Реєстрація</span></div>
      <div class="panel-title">Введи своє ім'я</div>
      <div class="input-wrap">
        <label>Ім'я гравця</label>
        <input type="text" id="nameInput" placeholder="Твій нікнейм..." maxlength="20" autocomplete="off">
      </div>
      <button class="btn btn-gold" onclick="startRegistration()">Почати тест →</button>
    </div>
  </div>

  <!-- BLOCKED SCREEN -->
  <div class="screen hidden" id="screenBlocked">
    <div class="panel">
      <div class="blocked-icon">🔒</div>
      <div class="warning-box">
        Ти вже проходив цей тест!<br>
        Повторне проходження заблоковано.
      </div>
      <div id="prevScoreInfo" style="text-align:center;margin-bottom:20px;"></div>
      <hr class="divider">
      <p style="text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:16px;letter-spacing:1px;">Введи пароль адміна для скидання</p>
      <div class="input-wrap">
        <label>Пароль</label>
        <input type="password" id="adminPassInput" placeholder="••••••••" autocomplete="off">
      </div>
      <button class="btn btn-gold" onclick="tryAdminUnlock()">Розблокувати</button>
      <div id="adminError" style="text-align:center;color:var(--red);font-size:0.85rem;margin-top:12px;display:none;">Невірний пароль! Спробуй ще раз.</div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen hidden" id="screenQuiz">
    <div class="current-user-bar" id="userBar">
      <div class="dot"></div>
      <span>Гравець:</span>
      <strong id="userBarName"></strong>
    </div>
    <div class="panel" style="max-width:680px;">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="question-meta">
        <span class="q-num" id="qNum">01 / 16</span>
        <span class="q-pts" id="qPts">⬡ +5 балів</span>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options-grid" id="optionsGrid"></div>
      <div id="feedbackBox"></div>
      <div class="next-btn-wrap">
        <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Далі →</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen hidden" id="screenResult">
    <div class="panel">
      <div class="score-big">
        <div id="resultEmoji" style="font-size:3rem;margin-bottom:8px;"></div>
        <div class="score-number" id="finalScore">0</div>
        <div class="score-label">Балів з 80</div>
        <div class="score-rank" id="rankLabel"></div>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" id="statCorrect">0</div>
          <div class="stat-lbl">Правильних</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="statWrong">0</div>
          <div class="stat-lbl">Помилок</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="statPct">0%</div>
          <div class="stat-lbl">Точність</div>
        </div>
      </div>
      <div id="resultMsg" style="text-align:center;color:var(--muted);font-size:0.95rem;line-height:1.6;padding:0 10px;"></div>
    </div>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const ADMIN_PASSWORD = "nikus1488admin";
const STORAGE_KEY = "nikusQuiz_v1";

// ===================== QUESTIONS =====================
const questions = [
  {
    q: "Коли був релізнутий Нікус Кейс Ультра?",
    options: ["15 серпня", "2 вересня", "28 серпня", "10 вересня"],
    correct: 1,
    pts: 5
  },
  {
    q: "Скільки кейсів було у оновленні FallPass25?",
    options: ["5 кейсів", "9 кейсів", "7 кейсів", "12 кейсів"],
    correct: 2,
    pts: 5
  },
  {
    q: "Коли закінчився батл пас FallPass25?",

    pts: 5

  {

    pts: 5

  {

    options: ["31 жовтня", "1 листопада", "20 жовтня", "13 жовтня"],
    correct: 3,
    pts: 5
  },
  {
    q: "Коли закінчився батл пас ScaryPass25?",
    options: ["1 грудня", "14 листопада", "30 листопада", "7 листопада"],
    correct: 1,
    pts: 5
  },
  {
    q: "Коли вперше випали людям секретки?",
    options: ["20 листопада", "1 грудня", "10 листопада", "17 листопада"],
    correct: 3,
    pts: 5
  },
  {
    q: "Коли вийшло оновлення WinterDreams?",
    options: ["1 грудня", "15 листопада", "20 листопада", "30 листопада"],
    correct: 2,
    pts: 5
  },
  {
    q: "Коли закінчився батл пас WinterDreams?",
    options: ["31 грудня", "1 лютого", "14 січня", "7 лютого"],
    correct: 2,
    pts: 5
  },
  {
    q: "Правда чи ні: 7 січня ХKoin коштував більше 100 нікусів?",
    options: ["Неправда, він коштував менше", "Правда", "Правда, але лише вранці", "Такого не було взагалі"],
    correct: 1,
    pts: 5
  },
  {
    q: "Коли вийшло оновлення Cat&Dog?",
    options: ["14 січня", "7 лютого", "21 січня", "31 грудня"],
    correct: 2,
    pts: 5
  },
  {
    q: "Яку рідкість предметів було додано у Cat&Dog Update?",
    options: ["Легендарну", "Епічну", "Ексклюзивну", "Спеціальну"],
    correct: 3,
    pts: 5
  },
  {
    q: "Коли закінчився батл пас Cat&Dog?",
    options: ["28 лютого", "7 березня", "14 березня", "21 лютого"],
    correct: 3,
    pts: 5
  },
  {
    q: "Коли вийшло оновлення FlowerPower?",
    options: ["14 лютого", "28 лютого", "2 березня", "10 березня"],
    correct: 2,
    pts: 5
  },
  {
    q: "Які основні механіки були додані у оновленні FlowerPower?",
    options: [
      "Нікус ПК; Криптобіржа; Профіль Меню",
      "Ринок; Банк; Нікус ПК",
      "Нікус ПК; Ринок; Профіль Меню",
      "Профіль Меню; Інвентар; Банк"
    ],
    correct: 2,
    pts: 5
  }
];

// ===================== STATE =====================
let currentUser = "";
let currentQ = 0;
let score = 0;
let correctCount = 0;
let answered = false;

// ===================== STARS =====================
function createStars() {
  const container = document.getElementById('starsContainer');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.cssText = `
      width:${size}px;height:${size}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(star);
  }
}
createStars();

// ===================== SCREENS =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.style.display = 'flex';
}

// ===================== REGISTRATION =====================
function startRegistration() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    document.getElementById('nameInput').focus();
    document.getElementById('nameInput').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('nameInput').style.borderColor = '', 1000);
    return;
  }
  currentUser = name;
  checkIfAlreadyDone();
}

function checkIfAlreadyDone() {
  const key = STORAGE_KEY + "_" + currentUser.toLowerCase();
  const saved = localStorage.getItem(key);
  if (saved) {
    const data = JSON.parse(saved);
    document.getElementById('prevScoreInfo').innerHTML = `
      <span style="color:var(--muted);font-size:0.85rem;letter-spacing:1px;">
        Попередній результат <strong style="color:var(--gold)">${data.score} / 80</strong> балів
      </span>`;
    showScreen('screenBlocked');
  } else {
    startQuiz();
  }
}

// ===================== ADMIN UNLOCK =====================
function tryAdminUnlock() {
  const pass = document.getElementById('adminPassInput').value;
  if (pass === ADMIN_PASSWORD) {
    const key = STORAGE_KEY + "_" + currentUser.toLowerCase();
    localStorage.removeItem(key);
    document.getElementById('adminPassInput').value = '';
    document.getElementById('adminError').style.display = 'none';
    startQuiz();
  } else {
    document.getElementById('adminError').style.display = 'block';
    document.getElementById('adminPassInput').value = '';
    document.getElementById('adminPassInput').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('adminPassInput').style.borderColor = '', 1000);
  }
}

// ===================== QUIZ =====================
function startQuiz() {
  currentQ = 0;
  score = 0;
  correctCount = 0;
  document.getElementById('userBarName').textContent = currentUser;
  showScreen('screenQuiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('qNum').textContent =
    String(currentQ + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');
  document.getElementById('qPts').textContent = `⬡ +${q.pts} балів`;
  document.getElementById('progressBar').style.width = (currentQ / total * 100) + '%';
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedbackBox').innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';

  const letters = ['А', 'Б', 'В', 'Г'];
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    grid.appendChild(btn);
  });
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  if (idx === q.correct) {
    btn.classList.add('correct');
    score += q.pts;
    correctCount++;
    showFeedback(true);
  } else {
    btn.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    showFeedback(false);
  }
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function showFeedback(isCorrect) {
  const box = document.getElementById('feedbackBox');
  if (isCorrect) {
    box.innerHTML = `<div class="feedback correct-fb">✓ ПРАВИЛЬНО! +5 БАЛІВ</div>`;
  } else {
    box.innerHTML = `<div class="feedback wrong-fb">✗ НЕПРАВИЛЬНО</div>`;
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    finishQuiz();
  } else {
    renderQuestion();
  }
}

// ===================== FINISH =====================
function finishQuiz() {
  // Save result
  const key = STORAGE_KEY + "_" + currentUser.toLowerCase();
  localStorage.setItem(key, JSON.stringify({ score, correctCount, date: Date.now() }));

  // Update progress bar
  document.getElementById('progressBar').style.width = '100%';

  const total = questions.length * 5;
  const pct = Math.round(correctCount / questions.length * 100);

  document.getElementById('finalScore').textContent = score;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = questions.length - correctCount;
  document.getElementById('statPct').textContent = pct + '%';

  let emoji, rank, msg;
  if (pct >= 90) {
    emoji = '🏆'; rank = '⬡ ЛЕГЕНДА НІКУСУ ⬡';
    msg = `${currentUser}, ти справжній гуру гри! Знання на рівні розробника. Скоріш за все, ти провів у грі десятки годин.`;
  } else if (pct >= 75) {
    emoji = '🥇'; rank = '⬡ ВЕТЕРАН ⬡';
    msg = `${currentUser}, вражаючий результат! Ти добре орієнтуєшся в хроніці гри та знаєш майже всі деталі.`;
  } else if (pct >= 55) {
    emoji = '🥈'; rank = '⬡ ДОСВІДЧЕНИЙ ⬡';
    msg = `${currentUser}, непоганий результат! Є над чим попрацювати, але база знань у тебе добра.`;
  } else if (pct >= 35) {
    emoji = '🥉'; rank = '⬡ НОВАЧОК ⬡';
    msg = `${currentUser}, варто більше грати та стежити за оновленнями. Нікус чекає на тебе!`;
  } else {
    emoji = '💀'; rank = '⬡ НУБІК ⬡';
    msg = `${currentUser}, схоже ти взагалі не чув про цю гру 😅 Спробуй ще раз після того, як пограєш!`;
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('rankLabel').innerHTML = `<span style="color:var(--gold);font-family:'Orbitron',sans-serif;font-size:1rem;letter-spacing:2px;">${rank}</span>`;
  document.getElementById('resultMsg').textContent = msg;

  showScreen('screenResult');
}

// ===================== INIT =====================
showScreen('screenRegister');

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startRegistration();
});
document.getElementById('adminPassInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryAdminUnlock();
});
</script>
</body>
</html>
